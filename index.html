<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐉 Home Server Grimoire</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel:wght@400;600;900&family=Raleway:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0c0f;
    --bg2: #111318;
    --bg3: #181c24;
    --border: #2a3040;
    --accent: #c8a84b;
    --accent2: #5b8dd9;
    --accent3: #4ecdc4;
    --text: #d4d8e2;
    --text-dim: #7a8299;
    --tab-active: #1a2035;
    --tab-hover: #161b28;
    --danger: #e05c5c;
    --success: #4caf7d;
    --glow: rgba(200, 168, 75, 0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 24px 20px 40px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 20px 28px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-bottom: 2px solid var(--accent);
    border-radius: 4px 4px 0 0;
    margin-bottom: 0;
  }

  .header-dragon {
    font-size: 2.8rem;
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(200,168,75,0.5));
  }

  .header-text h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-shadow: 0 0 20px rgba(200,168,75,0.3);
  }

  .header-text p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: 0.1em;
  }

  .header-badge {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 0.08em;
  }

  .badge-win { background: rgba(91,141,217,0.2); color: var(--accent2); border: 1px solid rgba(91,141,217,0.3); }
  .badge-v1 { background: rgba(78,205,196,0.15); color: var(--accent3); border: 1px solid rgba(78,205,196,0.3); }

  /* ── Binder spine ── */
  .binder-body {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-top: none;
    min-height: 700px;
  }

  .tab-spine {
    width: 52px;
    background: linear-gradient(180deg, #0d1018 0%, #0a0c0f 100%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    gap: 2px;
    flex-shrink: 0;
  }

  .spine-label {
    writing-mode: vertical-rl;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: uppercase;
    padding: 8px 4px;
  }

  /* ── Top tab bar ── */
  .tab-bar {
    display: flex;
    overflow-x: auto;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .tab-bar::-webkit-scrollbar { height: 3px; }
  .tab-bar::-webkit-scrollbar-track { background: transparent; }
  .tab-bar::-webkit-scrollbar-thumb { background: var(--border); }

  .tab-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 10px 16px 8px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Raleway', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    white-space: nowrap;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    position: relative;
  }

  .tab-btn .tab-icon { font-size: 1.1rem; }

  .tab-btn:hover {
    background: var(--tab-hover);
    color: var(--text);
  }

  .tab-btn.active {
    background: var(--tab-active);
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-btn.active .tab-icon {
    filter: drop-shadow(0 0 6px rgba(200,168,75,0.6));
  }

  /* ── Content area ── */
  .content-area {
    flex: 1;
    overflow: hidden;
  }

  .tab-content {
    display: none;
    height: 100%;
    animation: fadeIn 0.25s ease;
  }

  .tab-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .tab-content iframe {
    width: 100%;
    height: calc(100vh - 220px);
    min-height: 600px;
    border: none;
    background: var(--bg2);
  }

  /* ── Footer ── */
  footer {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 0 0 4px 4px;
  }

  footer span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    margin-right: 6px;
    box-shadow: 0 0 6px var(--success);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Ring holes on spine ── */
  .ring {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="shell">

  <header>
    <div class="header-dragon">🐉</div>
    <div class="header-text">
      <h1>Home Server Grimoire</h1>
      <p>// WINDOWS 10 DESKTOP · PLEX · MINECRAFT · AND BEYOND //</p>
    </div>
    <div class="header-badge">
      <span class="badge badge-win">⊞ Windows 10</span>
      <span class="badge badge-v1">✦ V1 → SSO Roadmap</span>
    </div>
  </header>

  <div class="binder-body">

    <!-- Spine with ring binders -->
    <div class="tab-spine">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="spine-label">Server Grimoire</div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>

    <div style="flex:1; display:flex; flex-direction:column;">

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('storage')" id="tab-storage">
          <span class="tab-icon">💾</span>Storage
        </button>
        <button class="tab-btn" onclick="switchTab('calibre')" id="tab-calibre">
          <span class="tab-icon">📚</span>Calibre
        </button>
        <button class="tab-btn" onclick="switchTab('audiobooks')" id="tab-audiobooks">
          <span class="tab-icon">🎧</span>Audiobooks
        </button>
        <button class="tab-btn" onclick="switchTab('minecraft')" id="tab-minecraft">
          <span class="tab-icon">⛏️</span>Minecraft
        </button>
        <button class="tab-btn" onclick="switchTab('monitor')" id="tab-monitor">
          <span class="tab-icon">📡</span>Monitor
        </button>
        <button class="tab-btn" onclick="switchTab('owncloud')" id="tab-owncloud">
          <span class="tab-icon">☁️</span>OwnCloud
        </button>
        <button class="tab-btn" onclick="switchTab('sso')" id="tab-sso">
          <span class="tab-icon">🔐</span>SSO
        </button>
        <button class="tab-btn" onclick="switchTab('seedbox')" id="tab-seedbox">
          <span class="tab-icon">🌱</span>Seedbox
        </button>
        <button class="tab-btn" onclick="switchTab('gamecube')" id="tab-gamecube">
          <span class="tab-icon">🎮</span>GameCube
        </button>
      </div>

      <!-- Content panes -->
      <div class="content-area">
        <div class="tab-content active" id="content-storage">
          <iframe src="storage.html" title="Storage"></iframe>
        </div>
        <div class="tab-content" id="content-calibre">
          <iframe src="calibre.html" title="Calibre"></iframe>
        </div>
        <div class="tab-content" id="content-audiobooks">
          <iframe src="audiobooks.html" title="Audiobookshelf"></iframe>
        </div>
        <div class="tab-content" id="content-minecraft">
          <iframe src="minecraft.html" title="Minecraft"></iframe>
        </div>
        <div class="tab-content" id="content-monitor">
          <iframe src="monitor.html" title="Monitor"></iframe>
        </div>
        <div class="tab-content" id="content-owncloud">
          <iframe src="owncloud.html" title="OwnCloud"></iframe>
        </div>
        <div class="tab-content" id="content-sso">
          <iframe src="sso.html" title="SSO"></iframe>
        </div>
        <div class="tab-content" id="content-seedbox">
          <iframe src="seedbox.html" title="Seedbox"></iframe>
        </div>
        <div class="tab-content" id="content-gamecube">
          <iframe src="gamecube.html" title="GameCube"></iframe>
        </div>
      </div>

    </div>
  </div>

  <footer>
    <span><span class="status-dot"></span>GRIMOIRE v1.0 · LOCAL REFERENCE</span>
    <span>🐉 NO DOCKER REQUIRED · WINDOWS 10 NATIVE PATHS INCLUDED</span>
    <span>✦ CLICK ANY TAB TO BEGIN</span>
  </footer>

</div>

<script>
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    document.getElementById('content-' + name).classList.add('active');
  }
</script>
</body>
</html>
